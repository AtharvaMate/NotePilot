<svg width="1000" height="880" viewBox="0 0 1000 880" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <filter id="ds">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="rgba(0,0,0,0.10)"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="880" fill="#faf9f7"/>

  <!-- Title -->
  <text x="500" y="42" text-anchor="middle" font-size="28" font-weight="800" fill="#C41018" letter-spacing="1">Workflow Diagram</text>

  <!-- ══════════════════════════════════════════ -->
  <!-- ROW 1: Start → Sign In → Open YouTube     -->
  <!-- ══════════════════════════════════════════ -->

  <!-- Start -->
  <ellipse cx="110" cy="105" rx="58" ry="26" fill="#F5D0D0" stroke="#D9A0A0" stroke-width="1.2" filter="url(#ds)"/>
  <text x="110" y="101" text-anchor="middle" font-size="9" fill="#888">▶</text>
  <text x="110" y="114" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Start</text>

  <!-- Arrow: Start → Sign In -->
  <line x1="168" y1="105" x2="243" y2="105" stroke="#555" stroke-width="1.8"/>
  <polygon points="243,100 253,105 243,110" fill="#555"/>

  <!-- Sign In -->
  <rect x="258" y="78" width="155" height="54" rx="10" fill="#C5D9F1" stroke="#8BAED0" stroke-width="1.2" filter="url(#ds)"/>
  <text x="335" y="100" text-anchor="middle" font-size="12" font-weight="700" fill="#333">🔐 Sign In / Register</text>
  <text x="335" y="118" text-anchor="middle" font-size="9.5" fill="#555">Email or Google OAuth</text>

  <!-- Arrow: Sign In → Open YouTube -->
  <line x1="413" y1="105" x2="488" y2="105" stroke="#555" stroke-width="1.8"/>
  <polygon points="488,100 498,105 488,110" fill="#555"/>

  <!-- Open YouTube -->
  <rect x="503" y="78" width="155" height="54" rx="10" fill="#FAE0C8" stroke="#D4B898" stroke-width="1.2" filter="url(#ds)"/>
  <text x="580" y="100" text-anchor="middle" font-size="12" font-weight="700" fill="#333">🔗 Open YouTube</text>
  <text x="580" y="118" text-anchor="middle" font-size="9.5" fill="#555">Video auto-detected</text>

  <!-- ══════════════════════════════════════════ -->
  <!-- ROW 2: Watch Video                         -->
  <!-- ══════════════════════════════════════════ -->

  <!-- Arrow: Open YouTube ↓ Watch -->
  <line x1="580" y1="132" x2="580" y2="170" stroke="#555" stroke-width="1.8"/>
  <polygon points="575,170 580,180 585,170" fill="#555"/>

  <!-- Watch Video -->
  <rect x="503" y="185" width="155" height="54" rx="10" fill="#FAE0C8" stroke="#D4B898" stroke-width="1.2" filter="url(#ds)"/>
  <text x="580" y="207" text-anchor="middle" font-size="13" font-weight="700" fill="#333">▷ Watch Video</text>
  <text x="580" y="225" text-anchor="middle" font-size="9.5" fill="#555">Play &amp; learn</text>

  <!-- ══════════════════════════════════════════ -->
  <!-- ROW 3: Capture → Add Notes                 -->
  <!-- ══════════════════════════════════════════ -->

  <!-- Arrow: Watch ↓ Capture -->
  <line x1="580" y1="239" x2="580" y2="277" stroke="#555" stroke-width="1.8"/>
  <polygon points="575,277 580,287 585,277" fill="#555"/>

  <!-- Capture Frame -->
  <rect x="503" y="292" width="155" height="54" rx="10" fill="#C5D9F1" stroke="#8BAED0" stroke-width="1.2" filter="url(#ds)"/>
  <text x="580" y="314" text-anchor="middle" font-size="13" font-weight="700" fill="#333">📸 Capture Frame</text>
  <text x="580" y="332" text-anchor="middle" font-size="9.5" fill="#555">Popup or YT button</text>

  <!-- Arrow: Capture → Add Notes -->
  <line x1="658" y1="319" x2="733" y2="319" stroke="#555" stroke-width="1.8"/>
  <polygon points="733,314 743,319 733,324" fill="#555"/>

  <!-- Add Notes -->
  <rect x="748" y="292" width="155" height="54" rx="10" fill="#FFF3C8" stroke="#DDD098" stroke-width="1.2" filter="url(#ds)"/>
  <text x="825" y="314" text-anchor="middle" font-size="13" font-weight="700" fill="#333">✏️ Add Notes</text>
  <text x="825" y="332" text-anchor="middle" font-size="9.5" fill="#555">User description</text>

  <!-- Loop arrow: Capture ← back to Watch -->
  <polyline points="503,319 460,319 460,212 503,212" fill="none" stroke="#999" stroke-width="1.2" stroke-dasharray="5,3"/>
  <polygon points="498,207 503,212 498,217" fill="#999"/>
  <text x="448" y="268" text-anchor="end" font-size="9" fill="#999" font-style="italic">repeat</text>

  <!-- ══════════════════════════════════════════ -->
  <!-- ROW 4: AI OCR → AI Explain                 -->
  <!-- ══════════════════════════════════════════ -->

  <!-- Arrow: Add Notes ↓ AI OCR -->
  <line x1="825" y1="346" x2="825" y2="384" stroke="#555" stroke-width="1.8"/>
  <polygon points="820,384 825,394 830,384" fill="#555"/>

  <!-- AI OCR -->
  <rect x="748" y="399" width="155" height="54" rx="10" fill="#E8D5F5" stroke="#C0A8D8" stroke-width="1.2" filter="url(#ds)"/>
  <text x="825" y="421" text-anchor="middle" font-size="13" font-weight="700" fill="#333">🔍 AI OCR Extract</text>
  <text x="825" y="439" text-anchor="middle" font-size="9.5" fill="#555">Llama 4 Scout Vision</text>

  <!-- Arrow: AI OCR ← AI Explain -->
  <line x1="748" y1="426" x2="673" y2="426" stroke="#555" stroke-width="1.8"/>
  <polygon points="673,421 663,426 673,431" fill="#555"/>

  <!-- AI Explanation -->
  <rect x="503" y="399" width="155" height="54" rx="10" fill="#E8D5F5" stroke="#C0A8D8" stroke-width="1.2" filter="url(#ds)"/>
  <text x="580" y="421" text-anchor="middle" font-size="13" font-weight="700" fill="#333">✨ AI Explanation</text>
  <text x="580" y="439" text-anchor="middle" font-size="9.5" fill="#555">Llama 3.3 70B</text>

  <!-- ══════════════════════════════════════════ -->
  <!-- DECISION: Doubt Arises?                     -->
  <!-- ══════════════════════════════════════════ -->

  <!-- Arrow: Watch Video → Doubt -->
  <polyline points="503,212 400,212 400,370" fill="none" stroke="#555" stroke-width="1.8"/>
  <polygon points="395,370 400,380 405,370" fill="#555"/>

  <!-- Doubt Diamond -->
  <polygon points="310,426 400,380 490,426 400,472" fill="#F5D0D0" stroke="#D9A0A0" stroke-width="1.2" filter="url(#ds)"/>
  <text x="400" y="422" text-anchor="middle" font-size="12" font-weight="700" fill="#333">🤔 Doubt</text>
  <text x="400" y="440" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Arises?</text>

  <!-- Arrow: Doubt ↓ Yes → AI Chat -->
  <line x1="310" y1="426" x2="260" y2="426" stroke="#555" stroke-width="1.5"/>
  <line x1="260" y1="426" x2="260" y2="498" stroke="#555" stroke-width="1.5"/>
  <polygon points="255,498 260,508 265,498" fill="#555"/>
  <text x="268" y="470" font-size="11" font-weight="700" fill="#4CAF50">Yes</text>

  <!-- ══════════════════════════════════════════ -->
  <!-- ROW 5: AI Chat → AI Answer → Store          -->
  <!-- ══════════════════════════════════════════ -->

  <!-- AI Chat -->
  <rect x="183" y="513" width="155" height="54" rx="10" fill="#E8D5F5" stroke="#C0A8D8" stroke-width="1.2" filter="url(#ds)"/>
  <text x="260" y="535" text-anchor="middle" font-size="13" font-weight="700" fill="#333">💬 AI Chat</text>
  <text x="260" y="553" text-anchor="middle" font-size="9.5" fill="#555">Ask about the video</text>

  <!-- Arrow: AI Chat → Get Answer -->
  <line x1="338" y1="540" x2="413" y2="540" stroke="#555" stroke-width="1.8"/>
  <polygon points="413,535 423,540 413,545" fill="#555"/>

  <!-- Get AI Answer -->
  <rect x="428" y="513" width="155" height="54" rx="10" fill="#E8D5F5" stroke="#C0A8D8" stroke-width="1.2" filter="url(#ds)"/>
  <text x="505" y="535" text-anchor="middle" font-size="13" font-weight="700" fill="#333">🤖 Get AI Answer</text>
  <text x="505" y="553" text-anchor="middle" font-size="9.5" fill="#555">Context-aware reply</text>

  <!-- Arrow: AI Answer → Store -->
  <line x1="583" y1="540" x2="623" y2="540" stroke="#555" stroke-width="1.8"/>
  <polygon points="623,535 633,540 623,545" fill="#555"/>

  <!-- Arrow: AI Explain ↓ Store -->
  <line x1="580" y1="453" x2="580" y2="480" stroke="#555" stroke-width="1.2"/>
  <line x1="580" y1="480" x2="710" y2="480" stroke="#555" stroke-width="1.2"/>
  <line x1="710" y1="480" x2="710" y2="512" stroke="#555" stroke-width="1.2"/>
  <polygon points="705,512 710,522 715,512" fill="#555"/>

  <!-- Store All Notes -->
  <rect x="638" y="513" width="175" height="54" rx="10" fill="#B8E6D8" stroke="#80C8B0" stroke-width="1.5" filter="url(#ds)"/>
  <text x="725" y="535" text-anchor="middle" font-size="12" font-weight="700" fill="#1a6b4a">💾 Store All Notes</text>
  <text x="725" y="553" text-anchor="middle" font-size="9.5" fill="#2d8060">&amp; Answers</text>

  <!-- ══════════════════════════════════════════ -->
  <!-- ROW 6: Branch — Quiz | Cards | Share | PDF  -->
  <!-- ══════════════════════════════════════════ -->

  <!-- Arrow: Store ↓ branching -->
  <line x1="725" y1="567" x2="725" y2="598" stroke="#555" stroke-width="1.8"/>

  <!-- Horizontal branch line -->
  <line x1="140" y1="598" x2="890" y2="598" stroke="#555" stroke-width="1.5"/>

  <!-- Vertical drops -->
  <line x1="175" y1="598" x2="175" y2="628" stroke="#555" stroke-width="1.5"/>
  <polygon points="170,628 175,638 180,628" fill="#555"/>

  <line x1="395" y1="598" x2="395" y2="628" stroke="#555" stroke-width="1.5"/>
  <polygon points="390,628 395,638 400,628" fill="#555"/>

  <line x1="615" y1="598" x2="615" y2="628" stroke="#555" stroke-width="1.5"/>
  <polygon points="610,628 615,638 620,628" fill="#555"/>

  <line x1="835" y1="598" x2="835" y2="628" stroke="#555" stroke-width="1.5"/>
  <polygon points="830,628 835,638 840,628" fill="#555"/>

  <!-- Quiz Mode -->
  <rect x="100" y="643" width="150" height="54" rx="10" fill="#F5D0D0" stroke="#D9A0A0" stroke-width="1.2" filter="url(#ds)"/>
  <text x="175" y="665" text-anchor="middle" font-size="13" font-weight="700" fill="#333">❓ AI Quiz</text>
  <text x="175" y="683" text-anchor="middle" font-size="9.5" fill="#555">10 MCQ from transcript</text>

  <!-- Flashcards -->
  <rect x="320" y="643" width="150" height="54" rx="10" fill="#FFF3C8" stroke="#DDD098" stroke-width="1.2" filter="url(#ds)"/>
  <text x="395" y="665" text-anchor="middle" font-size="13" font-weight="700" fill="#333">📇 Flashcards</text>
  <text x="395" y="683" text-anchor="middle" font-size="9.5" fill="#555">15 flip-to-reveal cards</text>

  <!-- Share Room -->
  <rect x="540" y="643" width="150" height="54" rx="10" fill="#C5D9F1" stroke="#8BAED0" stroke-width="1.2" filter="url(#ds)"/>
  <text x="615" y="665" text-anchor="middle" font-size="13" font-weight="700" fill="#333">🔗 Share Room</text>
  <text x="615" y="683" text-anchor="middle" font-size="9.5" fill="#555">Live link for classmates</text>

  <!-- Export PDF -->
  <rect x="760" y="643" width="150" height="54" rx="10" fill="#B8E6D8" stroke="#80C8B0" stroke-width="1.2" filter="url(#ds)"/>
  <text x="835" y="665" text-anchor="middle" font-size="13" font-weight="700" fill="#1a6b4a">📄 Export PDF</text>
  <text x="835" y="683" text-anchor="middle" font-size="9.5" fill="#2d8060">Styled A4 document</text>

  <!-- ══════════════════════════════════════════ -->
  <!-- ROW 7: Sub-results                          -->
  <!-- ══════════════════════════════════════════ -->

  <line x1="175" y1="697" x2="175" y2="727" stroke="#555" stroke-width="1.3"/>
  <polygon points="170,727 175,737 180,727" fill="#555"/>

  <line x1="395" y1="697" x2="395" y2="727" stroke="#555" stroke-width="1.3"/>
  <polygon points="390,727 395,737 400,727" fill="#555"/>

  <line x1="615" y1="697" x2="615" y2="727" stroke="#555" stroke-width="1.3"/>
  <polygon points="610,727 615,737 620,727" fill="#555"/>

  <line x1="835" y1="697" x2="835" y2="727" stroke="#555" stroke-width="1.3"/>
  <polygon points="830,727 835,737 840,727" fill="#555"/>

  <!-- Quiz result -->
  <rect x="112" y="742" width="126" height="40" rx="8" fill="#F5D0D0" stroke="#D9A0A0" stroke-width="1" filter="url(#ds)"/>
  <text x="175" y="758" text-anchor="middle" font-size="10" font-weight="600" fill="#333">Score + Rewatch</text>
  <text x="175" y="772" text-anchor="middle" font-size="8.5" fill="#555">links for wrong Qs</text>

  <!-- Flashcard result -->
  <rect x="332" y="742" width="126" height="40" rx="8" fill="#FFF3C8" stroke="#DDD098" stroke-width="1" filter="url(#ds)"/>
  <text x="395" y="758" text-anchor="middle" font-size="10" font-weight="600" fill="#333">Flip &amp; Navigate</text>
  <text x="395" y="772" text-anchor="middle" font-size="8.5" fill="#555">KaTeX math support</text>

  <!-- Share result -->
  <rect x="552" y="742" width="126" height="40" rx="8" fill="#C5D9F1" stroke="#8BAED0" stroke-width="1" filter="url(#ds)"/>
  <text x="615" y="758" text-anchor="middle" font-size="10" font-weight="600" fill="#333">Classmates View</text>
  <text x="615" y="772" text-anchor="middle" font-size="8.5" fill="#555">Annotate &amp; Discuss</text>

  <!-- PDF result -->
  <rect x="772" y="742" width="126" height="40" rx="8" fill="#B8E6D8" stroke="#80C8B0" stroke-width="1" filter="url(#ds)"/>
  <text x="835" y="758" text-anchor="middle" font-size="10" font-weight="600" fill="#1a6b4a">Download PDF</text>
  <text x="835" y="772" text-anchor="middle" font-size="8.5" fill="#2d8060">Math + screenshots</text>

  <!-- ══════════════════════════════════════════ -->
  <!-- ROW 8: Converge → History → End             -->
  <!-- ══════════════════════════════════════════ -->

  <!-- Converge lines -->
  <line x1="175" y1="782" x2="175" y2="805" stroke="#555" stroke-width="1.2"/>
  <line x1="395" y1="782" x2="395" y2="805" stroke="#555" stroke-width="1.2"/>
  <line x1="615" y1="782" x2="615" y2="805" stroke="#555" stroke-width="1.2"/>
  <line x1="835" y1="782" x2="835" y2="805" stroke="#555" stroke-width="1.2"/>
  <line x1="175" y1="805" x2="835" y2="805" stroke="#555" stroke-width="1.5"/>

  <!-- Drop to History -->
  <line x1="500" y1="805" x2="500" y2="825" stroke="#555" stroke-width="1.5"/>
  <polygon points="495,825 500,835 505,825" fill="#555"/>

  <!-- History -->
  <rect x="415" y="835" width="170" height="34" rx="8" fill="#B8E6D8" stroke="#80C8B0" stroke-width="1.2" filter="url(#ds)"/>
  <text x="500" y="857" text-anchor="middle" font-size="12" font-weight="700" fill="#1a6b4a">📚 Saved to History</text>

  <!-- Arrow: History → End -->
  <line x1="585" y1="852" x2="655" y2="852" stroke="#555" stroke-width="1.8"/>
  <polygon points="655,847 665,852 655,857" fill="#555"/>

  <!-- End -->
  <ellipse cx="730" cy="852" rx="56" ry="24" fill="#B8E6D8" stroke="#80C8B0" stroke-width="1.5" filter="url(#ds)"/>
  <text x="730" y="857" text-anchor="middle" font-size="13" font-weight="700" fill="#1a6b4a">✅ End</text>
</svg>
