<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="wbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a14"/>
      <stop offset="100%" stop-color="#111122"/>
    </linearGradient>
    <linearGradient id="wacc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E50914"/>
      <stop offset="100%" stop-color="#B81D24"/>
    </linearGradient>
  </defs>

  <rect width="900" height="200" fill="url(#wbg)" rx="14"/>

  <!-- Step 1 -->
  <rect x="34" y="42" width="180" height="118" rx="10" fill="#161624" stroke="rgba(229,9,20,0.2)" stroke-width="1"/>
  <circle cx="64" cy="66" r="14" fill="rgba(229,9,20,0.12)"/>
  <text x="64" y="71" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="800" fill="#E50914">1</text>
  <text x="84" y="71" font-family="sans-serif" font-size="12" font-weight="700" fill="#e0e0e8">Watch YouTube</text>
  <text x="52" y="94" font-family="sans-serif" font-size="10" fill="#7070a0">Open any video on</text>
  <text x="52" y="108" font-family="sans-serif" font-size="10" fill="#7070a0">YouTube. NotePilot</text>
  <text x="52" y="122" font-family="sans-serif" font-size="10" fill="#7070a0">detects it instantly.</text>
  <!-- play icon -->
  <polygon points="88,138 88,150 100,144" fill="#E50914" opacity="0.5"/>

  <!-- Arrow 1 -->
  <line x1="220" y1="100" x2="248" y2="100" stroke="rgba(229,9,20,0.3)" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="248,96 256,100 248,104" fill="rgba(229,9,20,0.4)"/>

  <!-- Step 2 -->
  <rect x="260" y="42" width="180" height="118" rx="10" fill="#161624" stroke="rgba(229,9,20,0.2)" stroke-width="1"/>
  <circle cx="290" cy="66" r="14" fill="rgba(229,9,20,0.12)"/>
  <text x="290" y="71" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="800" fill="#E50914">2</text>
  <text x="310" y="71" font-family="sans-serif" font-size="12" font-weight="700" fill="#e0e0e8">Capture Frames</text>
  <text x="278" y="94" font-family="sans-serif" font-size="10" fill="#7070a0">Click Capture to grab</text>
  <text x="278" y="108" font-family="sans-serif" font-size="10" fill="#7070a0">a frame. AI extracts</text>
  <text x="278" y="122" font-family="sans-serif" font-size="10" fill="#7070a0">text &amp; explains it.</text>
  <!-- camera icon -->
  <rect x="306" y="134" width="18" height="14" rx="3" fill="none" stroke="#E50914" stroke-width="1.5" opacity="0.5"/>
  <circle cx="315" cy="141" r="3" fill="none" stroke="#E50914" stroke-width="1.5" opacity="0.5"/>

  <!-- Arrow 2 -->
  <line x1="446" y1="100" x2="474" y2="100" stroke="rgba(229,9,20,0.3)" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="474,96 482,100 474,104" fill="rgba(229,9,20,0.4)"/>

  <!-- Step 3 -->
  <rect x="486" y="42" width="180" height="118" rx="10" fill="#161624" stroke="rgba(229,9,20,0.2)" stroke-width="1"/>
  <circle cx="516" cy="66" r="14" fill="rgba(229,9,20,0.12)"/>
  <text x="516" y="71" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="800" fill="#E50914">3</text>
  <text x="536" y="71" font-family="sans-serif" font-size="12" font-weight="700" fill="#e0e0e8">Learn &amp; Quiz</text>
  <text x="504" y="94" font-family="sans-serif" font-size="10" fill="#7070a0">AI Chat, Quiz Mode,</text>
  <text x="504" y="108" font-family="sans-serif" font-size="10" fill="#7070a0">and Flashcards test</text>
  <text x="504" y="122" font-family="sans-serif" font-size="10" fill="#7070a0">your understanding.</text>
  <!-- brain/question icon -->
  <circle cx="541" cy="142" r="7" fill="none" stroke="#E50914" stroke-width="1.5" opacity="0.5"/>
  <text x="541" y="146" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#E50914" opacity="0.5">?</text>

  <!-- Arrow 3 -->
  <line x1="672" y1="100" x2="700" y2="100" stroke="rgba(229,9,20,0.3)" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="700,96 708,100 700,104" fill="rgba(229,9,20,0.4)"/>

  <!-- Step 4 -->
  <rect x="712" y="42" width="154" height="118" rx="10" fill="#161624" stroke="rgba(229,9,20,0.2)" stroke-width="1"/>
  <circle cx="742" cy="66" r="14" fill="rgba(229,9,20,0.12)"/>
  <text x="742" y="71" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="800" fill="#E50914">4</text>
  <text x="762" y="71" font-family="sans-serif" font-size="12" font-weight="700" fill="#e0e0e8">Share &amp; Export</text>
  <text x="730" y="94" font-family="sans-serif" font-size="10" fill="#7070a0">Export PDF or share</text>
  <text x="730" y="108" font-family="sans-serif" font-size="10" fill="#7070a0">a live study room</text>
  <text x="730" y="122" font-family="sans-serif" font-size="10" fill="#7070a0">with classmates.</text>
  <!-- share icon -->
  <circle cx="756" cy="138" r="3" fill="#E50914" opacity="0.4"/>
  <circle cx="770" cy="148" r="3" fill="#E50914" opacity="0.4"/>
  <circle cx="756" cy="148" r="0" fill="none"/>
  <line x1="758" y1="139" x2="768" y2="147" stroke="#E50914" stroke-width="1.2" opacity="0.4"/>

  <!-- Title -->
  <text x="450" y="26" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" letter-spacing="2" fill="#505068">HOW IT WORKS</text>
</svg>
