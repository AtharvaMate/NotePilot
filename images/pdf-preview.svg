<svg width="600" height="780" viewBox="0 0 600 780" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="header" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#11111e"/>
      <stop offset="100%" stop-color="#0d0d16"/>
    </linearGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>

  <!-- Paper shadow -->
  <rect x="6" y="8" width="594" height="772" rx="4" fill="rgba(0,0,0,0.35)"/>
  <!-- Paper -->
  <rect width="594" height="772" rx="4" fill="#fafafa"/>

  <!-- ── COVER HEADER ── -->
  <rect width="594" height="130" fill="url(#header)"/>
  <!-- Top accent bar -->
  <rect width="594" height="3" fill="url(#acc)"/>
  <!-- Logo mark -->
  <rect x="24" y="16" width="20" height="20" rx="4" fill="#6366f1"/>
  <rect x="27" y="19" width="14" height="14" rx="2.5" fill="#a855f7"/>
  <!-- Brand -->
  <text x="50" y="31" font-family="sans-serif" font-size="9" font-weight="700" letter-spacing="1.5" fill="#818cf8">NOTEPILOT</text>
  <!-- Title -->
  <text x="297" y="72" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="700" fill="#eeeef5">Physics 101 — Study Notes</text>
  <!-- Subtitle -->
  <text x="297" y="92" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#818cf8">Introduction to Circular Motion  ·  15 Mar 2025</text>
  <!-- Bottom bar -->
  <rect y="125" width="594" height="3" fill="#6366f1"/>
  <rect x="297" y="125" width="297" height="3" fill="#a855f7"/>

  <!-- ── VIDEO LINK PILL ── -->
  <rect x="24" y="142" width="546" height="22" rx="4" fill="#f0f0fc" stroke="#dcdcee" stroke-width="0.5"/>
  <text x="32" y="157" font-family="monospace" font-size="9" fill="#6366f1">&gt; youtube.com/watch?v=I0Is0odX8NE</text>
  <text x="556" y="157" text-anchor="end" font-family="sans-serif" font-size="8.5" fill="#9090a8">2 captures  ·  3 Q&amp;A</text>

  <!-- ── VIDEO SUMMARY SECTION ── -->
  <rect x="24" y="178" width="546" height="22" rx="4" fill="#f0f0fc"/>
  <rect x="24" y="178" width="4" height="22" rx="2" fill="#6366f1"/>
  <text x="36" y="193" font-family="sans-serif" font-size="11" font-weight="700" fill="#6366f1">&gt;  Video Summary</text>
  <text x="24" y="215" font-family="sans-serif" font-size="9" fill="#505070">This video introduces circular motion, focusing on centripetal force and acceleration. Key equations</text>
  <text x="24" y="228" font-family="sans-serif" font-size="9" fill="#505070">including F = mv²/r and a = v²/r are derived and applied to real-world scenarios involving strings.</text>
  <line x1="24" y1="240" x2="570" y2="240" stroke="#dcdcee" stroke-width="0.5"/>

  <!-- ── CAPTURED NOTES SECTION ── -->
  <rect x="24" y="254" width="546" height="22" rx="4" fill="#f0f0fc"/>
  <rect x="24" y="254" width="4" height="22" rx="2" fill="#6366f1"/>
  <text x="36" y="269" font-family="sans-serif" font-size="11" font-weight="700" fill="#6366f1">&gt;  Captured Notes</text>

  <!-- Note card 1 -->
  <rect x="24" y="285" width="546" height="210" rx="6" fill="#f5f5fc" stroke="#dcdcee" stroke-width="0.5"/>
  <rect x="24" y="285" width="3" height="210" rx="1.5" fill="#6366f1"/>
  <!-- Timestamp pill -->
  <rect x="36" y="294" width="108" height="16" rx="8" fill="#6366f1"/>
  <text x="90" y="305.5" text-anchor="middle" font-family="sans-serif" font-size="8" font-weight="700" fill="white">&gt; 14:32  -  Note #1</text>
  <!-- Screenshot box -->
  <rect x="36" y="318" width="260" height="90" rx="4" fill="#e8e8f5" stroke="#dcdcee" stroke-width="0.5"/>
  <text x="166" y="368" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#9090a8">[Video Frame Thumbnail]</text>
  <!-- Note text -->
  <text x="36" y="425" font-family="sans-serif" font-size="8.5" fill="#505070">Centripetal force acts toward center of circle. Important for understanding orbital mechanics.</text>
  <!-- OCR header -->
  <rect x="36" y="438" width="526" height="16" rx="3" fill="#e6e4fc"/>
  <text x="44" y="449.5" font-family="sans-serif" font-size="7.5" font-weight="700" fill="#6366f1">EXTRACTED TEXT</text>
  <text x="36" y="466" font-family="sans-serif" font-size="8.5" fill="#505070">Centripetal Force: F = mv²/r</text>
  <text x="36" y="479" font-family="sans-serif" font-size="8.5" fill="#505070">where m is the mass of the object, v is the velocity, r is the radius of circular path.</text>
  <text x="36" y="490" font-family="sans-serif" font-size="8.5" fill="#505070">[Diagram: circle with arrow pointing inward labeled F, particle labeled m on perimeter]</text>

  <!-- Note card 2 -->
  <rect x="24" y="504" width="546" height="90" rx="6" fill="#f5f5fc" stroke="#dcdcee" stroke-width="0.5"/>
  <rect x="24" y="504" width="3" height="90" rx="1.5" fill="#6366f1"/>
  <rect x="36" y="512" width="108" height="16" rx="8" fill="#6366f1"/>
  <text x="90" y="523.5" text-anchor="middle" font-family="sans-serif" font-size="8" font-weight="700" fill="white">&gt; 22:17  -  Note #2</text>
  <!-- AI explanation header -->
  <rect x="36" y="534" width="526" height="16" rx="3" fill="#f5ebff"/>
  <text x="44" y="545.5" font-family="sans-serif" font-size="7.5" font-weight="700" fill="#a855f7">AI EXPLANATION</text>
  <text x="36" y="562" font-family="sans-serif" font-size="8.5" fill="#505070">The tension T in the string provides the centripetal force: T = mv²/r. As velocity increases,</text>
  <text x="36" y="574" font-family="sans-serif" font-size="8.5" fill="#505070">greater tension is required to maintain circular motion. This has a maximum breaking limit.</text>

  <!-- ── AI Q&A SECTION ── -->
  <rect x="24" y="610" width="546" height="22" rx="4" fill="#f0f0fc"/>
  <rect x="24" y="610" width="4" height="22" rx="2" fill="#6366f1"/>
  <text x="36" y="625" font-family="sans-serif" font-size="11" font-weight="700" fill="#6366f1">&gt;  AI Q&amp;A</text>
  <!-- Q1 -->
  <rect x="24" y="642" width="546" height="18" rx="4" fill="#e6e4fc" stroke="#6366f1" stroke-width="0.3"/>
  <text x="32" y="654.5" font-family="sans-serif" font-size="8" font-weight="700" fill="#6366f1">Q1</text>
  <text x="52" y="654.5" font-family="sans-serif" font-size="8.5" fill="#303050">What is the centripetal force formula?</text>
  <text x="24" y="672" font-family="sans-serif" font-size="8.5" fill="#505070">The centripetal force is F = mv²/r, always directed toward the center of circular motion.</text>
  <!-- Q2 -->
  <rect x="24" y="688" width="546" height="18" rx="4" fill="#e6e4fc" stroke="#6366f1" stroke-width="0.3"/>
  <text x="32" y="700.5" font-family="sans-serif" font-size="8" font-weight="700" fill="#6366f1">Q2</text>
  <text x="52" y="700.5" font-family="sans-serif" font-size="8.5" fill="#303050">How does radius affect the required force?</text>
  <text x="24" y="718" font-family="sans-serif" font-size="8.5" fill="#505070">For constant speed, a smaller radius requires greater centripetal force — F is inversely proportional to r.</text>

  <!-- ── PAGE FOOTER ── -->
  <rect y="750" width="594" height="22" fill="#f5f5fc"/>
  <rect y="750" width="594" height="1.5" fill="#6366f1"/>
  <text x="24" y="764" font-family="sans-serif" font-size="7.5" fill="#9090a8">Generated by NotePilot</text>
  <text x="297" y="764" text-anchor="middle" font-family="sans-serif" font-size="7.5" fill="#9090a8">Introduction to Circular Motion</text>
  <text x="570" y="764" text-anchor="end" font-family="sans-serif" font-size="7.5" fill="#6366f1">1 / 2</text>
</svg>
