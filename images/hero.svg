<svg width="900" height="220" viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07070d"/>
      <stop offset="100%" stop-color="#0d0d1f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="logo-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="220" fill="url(#bg)" rx="16"/>

  <!-- Top accent bar -->
  <rect width="900" height="3" fill="url(#accent)" rx="1"/>

  <!-- Subtle grid dots -->
  <pattern id="dots" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="15" cy="15" r="1" fill="rgba(99,102,241,0.12)"/>
  </pattern>
  <rect width="900" height="220" fill="url(#dots)"/>

  <!-- Glow blob -->
  <ellipse cx="450" cy="110" rx="200" ry="80" fill="rgba(99,102,241,0.07)" filter="url(#glow)"/>

  <!-- Logo mark -->
  <rect x="356" y="52" width="44" height="44" rx="12" fill="url(#logo-grad)" opacity="0.95"/>
  <!-- graduation cap icon -->
  <g transform="translate(368, 62)" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M1 5l9-4.5 9 4.5-9 4.5z"/>
    <path d="M4.5 6.5v4.5c2.5 2.5 7.5 2.5 10 0V6.5"/>
    <line x1="19" y1="5" x2="19" y2="10"/>
  </g>

  <!-- Brand name -->
  <text x="412" y="82" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="30" font-weight="800" letter-spacing="3" fill="url(#accent)">NOTEPILOT</text>

  <!-- Tagline -->
  <text x="450" y="118" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="400" fill="#9090a8">AI-Powered YouTube Study Notes</text>

  <!-- Pills -->
  <rect x="224" y="144" width="100" height="26" rx="13" fill="rgba(99,102,241,0.12)" stroke="rgba(99,102,241,0.25)" stroke-width="1"/>
  <text x="274" y="161" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#818cf8">Frame Capture</text>

  <rect x="336" y="144" width="76" height="26" rx="13" fill="rgba(99,102,241,0.12)" stroke="rgba(99,102,241,0.25)" stroke-width="1"/>
  <text x="374" y="161" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#818cf8">AI OCR</text>

  <rect x="424" y="144" width="94" height="26" rx="13" fill="rgba(99,102,241,0.12)" stroke="rgba(99,102,241,0.25)" stroke-width="1"/>
  <text x="471" y="161" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#818cf8">Math Rendering</text>

  <rect x="530" y="144" width="84" height="26" rx="13" fill="rgba(99,102,241,0.12)" stroke="rgba(99,102,241,0.25)" stroke-width="1"/>
  <text x="572" y="161" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#818cf8">PDF Export</text>

  <rect x="626" y="144" width="68" height="26" rx="13" fill="rgba(16,185,129,0.1)" stroke="rgba(16,185,129,0.25)" stroke-width="1"/>
  <text x="660" y="161" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#10b981">Free API</text>

  <!-- Bottom accent -->
  <rect y="217" width="900" height="3" fill="url(#accent)" rx="1"/>
</svg>
