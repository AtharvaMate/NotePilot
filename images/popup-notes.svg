<svg width="420" height="520" viewBox="0 0 420 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <clipPath id="clip"><rect width="420" height="520" rx="14"/></clipPath>
  </defs>

  <!-- Window shadow -->
  <rect x="4" y="6" width="420" height="520" rx="14" fill="rgba(0,0,0,0.5)"/>

  <!-- Body -->
  <rect width="420" height="520" rx="14" fill="#07070d" clip-path="url(#clip)"/>

  <!-- ── HEADER ── -->
  <rect width="420" height="44" fill="#0d0d16"/>
  <rect width="420" height="1" y="44" fill="rgba(255,255,255,0.06)"/>
  <!-- Logo -->
  <rect x="12" y="9" width="26" height="26" rx="7" fill="url(#acc)"/>
  <g transform="translate(18,14)" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round">
    <path d="M0 5l7-3.5 7 3.5-7 3.5z"/>
    <path d="M2.5 6v3.5c2 2 5.5 2 8 0V6"/>
  </g>
  <text x="44" y="27" font-family="sans-serif" font-size="11" font-weight="800" letter-spacing="1.5" fill="url(#acc)">NOTEPILOT</text>
  <!-- Status pill -->
  <rect x="310" y="13" width="96" height="18" rx="9" fill="rgba(16,185,129,0.08)" stroke="rgba(16,185,129,0.15)" stroke-width="1"/>
  <circle cx="322" cy="22" r="3.5" fill="#10b981"/>
  <text x="330" y="26.5" font-family="sans-serif" font-size="9" font-weight="600" fill="#10b981">Video detected</text>

  <!-- ── VIDEO BAR ── -->
  <rect y="44" width="420" height="36" fill="rgba(99,102,241,0.04)"/>
  <rect y="80" width="420" height="1" fill="rgba(255,255,255,0.06)"/>
  <text x="12" y="57" font-family="sans-serif" font-size="7" font-weight="700" letter-spacing="1" fill="#818cf8">NOW WATCHING</text>
  <text x="12" y="71" font-family="sans-serif" font-size="10" fill="#9090a8">Introduction to Circular Motion — Physics 101</text>
  <!-- Capture button -->
  <rect x="310" y="50" width="96" height="24" rx="6" fill="url(#acc)"/>
  <text x="358" y="66" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="600" fill="white">⊙  Capture</text>

  <!-- ── TABS ── -->
  <rect y="80" width="420" height="34" fill="#0d0d16"/>
  <rect y="114" width="420" height="1" fill="rgba(255,255,255,0.06)"/>
  <!-- Notes tab active -->
  <rect x="0" y="80" width="210" height="34" fill="rgba(99,102,241,0.04)"/>
  <rect x="0" y="112" width="210" height="2" fill="#6366f1"/>
  <text x="105" y="102" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#818cf8">Notes</text>
  <rect x="170" y="89" width="18" height="14" rx="7" fill="#6366f1"/>
  <text x="179" y="100" text-anchor="middle" font-family="sans-serif" font-size="8" font-weight="700" fill="white">2</text>
  <!-- Chat tab -->
  <text x="315" y="102" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#55556a">AI Chat</text>

  <!-- ── NOTE CARD 1 ── -->
  <rect x="10" y="124" width="400" height="152" rx="10" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <rect x="10" y="124" width="3" height="152" rx="1.5" fill="#6366f1"/>
  <!-- Timestamp pill -->
  <rect x="20" y="132" width="72" height="18" rx="9" fill="#6366f1"/>
  <text x="56" y="144.5" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="700" fill="white">&gt; 14:32  -  Note #1</text>
  <!-- Delete btn -->
  <text x="396" y="144" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#55556a">✕</text>
  <!-- Screenshot placeholder -->
  <rect x="10" y="155" width="400" height="72" fill="#0d0d16" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <rect x="10" y="155" width="200" height="72" rx="0" fill="rgba(99,102,241,0.05)"/>
  <!-- fake video frame lines -->
  <line x1="10" y1="175" x2="210" y2="175" stroke="rgba(99,102,241,0.1)" stroke-width="1"/>
  <line x1="10" y1="195" x2="210" y2="195" stroke="rgba(99,102,241,0.1)" stroke-width="1"/>
  <text x="110" y="195" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#55556a">Captured Frame</text>
  <text x="320" y="185" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#55556a">14:32</text>
  <!-- Action buttons -->
  <rect x="20" y="233" width="80" height="20" rx="5" fill="rgba(99,102,241,0.08)" stroke="rgba(99,102,241,0.12)" stroke-width="1"/>
  <text x="60" y="247" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="600" fill="#818cf8">Extract Text</text>
  <rect x="108" y="233" width="56" height="20" rx="5" fill="rgba(168,85,247,0.08)" stroke="rgba(168,85,247,0.15)" stroke-width="1"/>
  <text x="136" y="247" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="600" fill="#c084fc">Explain</text>
  <!-- Note textarea -->
  <rect x="10" y="257" width="400" height="1" fill="rgba(255,255,255,0.06)"/>
  <text x="20" y="270" font-family="sans-serif" font-size="9" fill="#55556a">Centripetal force acts toward center of circle...</text>

  <!-- ── NOTE CARD 2 ── -->
  <rect x="10" y="286" width="400" height="80" rx="10" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <rect x="10" y="286" width="3" height="80" rx="1.5" fill="#6366f1"/>
  <rect x="20" y="294" width="72" height="18" rx="9" fill="#6366f1"/>
  <text x="56" y="306.5" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="700" fill="white">&gt; 22:17  -  Note #2</text>
  <!-- OCR section -->
  <rect x="20" y="316" width="382" height="18" rx="4" fill="rgba(230,228,252,0.06)"/>
  <text x="28" y="328.5" font-family="sans-serif" font-size="8" font-weight="700" fill="#818cf8">EXTRACTED TEXT</text>
  <text x="20" y="346" font-family="sans-serif" font-size="8.5" fill="#9090a8">F = mv²/r  where m is mass, v is velocity, r is radius...</text>
  <text x="20" y="358" font-family="sans-serif" font-size="8.5" fill="#9090a8">The centripetal acceleration: a = v²/r</text>

  <!-- ── EXPORT FOOTER ── -->
  <rect y="430" width="420" height="1" fill="rgba(255,255,255,0.06)"/>
  <rect y="430" width="420" height="90" fill="#0d0d16"/>
  <rect x="10" y="441" width="254" height="28" rx="7" fill="#07070d" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="22" y="459" font-family="sans-serif" font-size="10" fill="#55556a">Physics 101 — Study Notes</text>
  <rect x="272" y="441" width="138" height="28" rx="7" fill="url(#acc)"/>
  <text x="341" y="459" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="600" fill="white">↓  Export PDF</text>
</svg>
