<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NotePilot — Study Room</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box }
    :root {
      --bg: #0a0a0a; --bg2: #111111; --card: #1a1a1a;
      --border: rgba(255,255,255,.07); --text: #f0f0f0; --text2: #a0a0a0;
      --muted: #666666; --accent: #E50914; --accent-l: #ff3333;
      --green: #46d369; --red: #E50914; --amber: #f5c518;
    }
    body { font-family: 'Helvetica Neue', Helvetica, Arial, -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }
    .page { max-width: 680px; margin: 0 auto; padding: 0 0 60px }
    .hdr { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .hdr-left { display: flex; align-items: center; gap: 8px }
    .logo { width: 28px; height: 28px; border-radius: 7px; background: linear-gradient(135deg, #E50914, #B81D24); display: flex; align-items: center; justify-content: center }
    .logo svg { width: 14px; height: 14px }
    .brand { font-size: .88rem; font-weight: 800; letter-spacing: 1.2px; background: linear-gradient(135deg, #E50914, #ff4444); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
    .share-pill { font-size: .62rem; font-weight: 600; padding: 3px 9px; border-radius: 50px; background: rgba(16,185,129,.1); color: var(--green); border: 1px solid rgba(16,185,129,.15); }
    .meta-bar { padding: 12px 20px; background: rgba(229,9,20,.03); border-bottom: 1px solid var(--border) }
    .meta-title { font-size: .88rem; font-weight: 600; color: var(--text); margin-bottom: 3px }
    .meta-sub { font-size: .68rem; color: var(--muted); display: flex; align-items: center; gap: 8px; flex-wrap: wrap }
    .meta-dot { width: 3px; height: 3px; border-radius: 50%; background: var(--muted) }

    /* Tabs */
    .room-tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--bg2); }
    .room-tab { flex: 1; padding: 10px; text-align: center; font-size: .78rem; font-weight: 600; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; transition: all .2s; background: none; border-top: none; border-left: none; border-right: none; font-family: inherit; }
    .room-tab:hover { color: var(--text2); background: rgba(255,255,255,.02) }
    .room-tab.active { color: var(--accent-l); border-bottom-color: var(--accent); background: rgba(229,9,20,.03) }
    .room-panel { display: none; }
    .room-panel.active { display: block; }

    .timeline-strip { padding: 10px 20px; border-bottom: 1px solid var(--border); background: var(--bg2); display: flex; gap: 8px; overflow-x: auto; align-items: flex-start }
    .timeline-strip::-webkit-scrollbar { height: 2px }
    .timeline-strip::-webkit-scrollbar-thumb { background: rgba(255,255,255,.08); border-radius: 99px }
    .tl-seg { flex-shrink: 0; cursor: pointer; padding: 5px 9px; background: var(--card); border: 1px solid var(--border); border-radius: 7px; transition: border-color .15s }
    .tl-seg:hover { border-color: var(--accent-l) }
    .tl-seg-ts { font-size: .6rem; font-weight: 700; color: var(--accent-l); font-variant-numeric: tabular-nums }
    .tl-seg-title { font-size: .68rem; color: var(--text2); margin-top: 2px; max-width: 120px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis }
    .notes-section { padding: 14px 20px 0 }
    .section-heading { font-size: .65rem; font-weight: 700; color: var(--muted); letter-spacing: .8px; text-transform: uppercase; margin-bottom: 10px }
    .note-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 12px; overflow: hidden; transition: border-color .2s }
    .note-card:hover { border-color: rgba(255,255,255,.1) }
    .note-top { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-bottom: 1px solid var(--border) }
    .note-ts-pill { font-size: .62rem; font-weight: 700; padding: 2px 8px; border-radius: 50px; background: rgba(229,9,20,.1); color: var(--accent-l); border: 1px solid rgba(229,9,20,.15); font-variant-numeric: tabular-nums; flex-shrink: 0; cursor: pointer; text-decoration: none }
    .note-ts-pill:hover { background: rgba(229,9,20,.18) }
    .note-num { font-size: .7rem; color: var(--muted); flex: 1 }
    .note-seg-tag { font-size: .58rem; padding: 2px 7px; border-radius: 50px; background: rgba(70,211,105,.08); color: var(--green); border: 1px solid rgba(70,211,105,.1) }
    .note-img { width: 100%; border-bottom: 1px solid var(--border) }
    .note-img img { width: 100%; height: auto; display: block; object-fit: contain }
    .note-body { padding: 8px 12px 6px }
    .note-text { font-size: .75rem; color: var(--text2); line-height: 1.55; margin-bottom: 6px; white-space: pre-wrap }
    .note-text.empty { color: var(--muted); font-style: italic }
    .ocr-block { background: rgba(229,9,20,.03); border: 1px solid rgba(229,9,20,.06); border-radius: 6px; padding: 6px 10px; margin-bottom: 6px }
    .ocr-label { font-size: .58rem; font-weight: 700; color: var(--accent-l); text-transform: uppercase; letter-spacing: .5px; display: block; margin-bottom: 3px }
    .ocr-text { font-size: .7rem; color: var(--text2); line-height: 1.5; white-space: pre-wrap }
    .expl-block { background: rgba(229,9,20,.04); border: 1px solid rgba(229,9,20,.08); border-radius: 6px; padding: 6px 10px; margin-bottom: 6px }
    .expl-label { font-size: .58rem; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: .5px; display: block; margin-bottom: 3px }
    .annotations { border-top: 1px solid var(--border); padding: 8px 12px }
    .ann-heading { font-size: .6rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 7px }
    .ann-item { display: flex; gap: 8px; margin-bottom: 8px; align-items: flex-start }
    .ann-avatar { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: .6rem; font-weight: 700; color: var(--accent-l); flex-shrink: 0 }
    .ann-content { flex: 1; min-width: 0 }
    .ann-name { font-size: .65rem; font-weight: 600; color: var(--text); margin-bottom: 2px }
    .ann-text { font-size: .7rem; color: var(--text2); line-height: 1.45 }
    .ann-time { font-size: .58rem; color: var(--muted); margin-top: 2px }
    .ann-form { display: flex; gap: 6px; margin-top: 6px }
    .ann-input { flex: 1; padding: 6px 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 7px; font-size: .72rem; color: var(--text); outline: none; font-family: inherit; transition: border-color .2s }
    .ann-input::placeholder { color: var(--muted) }
    .ann-input:focus { border-color: var(--accent) }
    .ann-submit { padding: 6px 12px; background: linear-gradient(135deg, #E50914, #B81D24); color: #fff; border: none; border-radius: 7px; font-size: .7rem; font-weight: 600; cursor: pointer; transition: all .2s; white-space: nowrap; font-family: inherit }
    .ann-submit:hover { transform: translateY(-1px) }
    .ann-submit:disabled { opacity: .4; cursor: not-allowed; transform: none }
    .loading-state { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; gap: 12px; color: var(--muted) }
    .spinner { width: 28px; height: 28px; border: 2px solid rgba(229,9,20,.15); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite }
    @keyframes spin { to { transform: rotate(360deg) } }
    .loading-text { font-size: .78rem; color: var(--muted) }
    .error-state { text-align: center; padding: 60px 20px; color: var(--muted) }
    .error-state p { font-size: .82rem; color: var(--text2); margin-bottom: 6px }
    .error-state span { font-size: .72rem }
    .toast-container { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 6px; align-items: center; pointer-events: none }
    .toast { padding: 8px 16px; border-radius: 9px; font-size: .73rem; font-weight: 500; backdrop-filter: blur(12px); border: 1px solid var(--border); pointer-events: auto; animation: fadeUp .2s ease-out }
    .toast-success { background: rgba(16,185,129,.12); color: var(--green) }
    .toast-error { background: rgba(239,68,68,.12); color: var(--red) }
    .toast-info { background: rgba(229,9,20,.1); color: var(--accent-l) }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(8px) } to { opacity: 1; transform: translateY(0) } }
    .katex-display { overflow-x: auto; padding: 4px 0 }

    /* ── Quiz in Room ── */
    .quiz-section { padding: 14px 20px 0 }
    .quiz-list-empty { text-align: center; padding: 40px 20px; color: var(--muted); font-size: .78rem; }
    .quiz-list-item { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; margin-bottom: 10px; cursor: pointer; transition: all .2s; display: flex; justify-content: space-between; align-items: center; }
    .quiz-list-item:hover { border-color: var(--accent-l); transform: translateY(-1px); }
    .quiz-list-info h4 { font-size: .82rem; color: var(--text); margin-bottom: 2px; }
    .quiz-list-info span { font-size: .65rem; color: var(--muted); }
    .quiz-list-badge { font-size: .65rem; padding: 3px 10px; border-radius: 50px; background: rgba(229,9,20,.08); color: var(--accent-l); border: 1px solid rgba(229,9,20,.12); font-weight: 700; }
    .btn-create-quiz { display: flex; align-items: center; justify-content: center; gap: 6px; width: 100%; padding: 12px; margin-bottom: 16px; background: linear-gradient(135deg, #E50914, #B81D24); color: #fff; border: none; border-radius: 10px; font-size: .82rem; font-weight: 700; cursor: pointer; transition: all .2s; font-family: inherit; }
    .btn-create-quiz:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(229,9,20,.3); }
    .btn-create-quiz:disabled { opacity: .5; cursor: not-allowed; transform: none; }
    .quiz-active-wrap { padding: 0 20px 20px; }
    .quiz-progress-wrap { margin-bottom: 12px; }
    .quiz-progress-top { display: flex; justify-content: space-between; font-size: .65rem; color: var(--muted); margin-bottom: 4px; }
    .quiz-progress-bar { height: 4px; background: rgba(255,255,255,.06); border-radius: 4px; overflow: hidden; }
    .quiz-progress-fill { height: 100%; background: linear-gradient(90deg, #E50914, #ff3333); border-radius: 4px; transition: width .3s; }
    .quiz-q-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 10px; }
    .quiz-q-topic { font-size: .6rem; font-weight: 700; color: var(--accent-l); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
    .quiz-q-text { font-size: .88rem; font-weight: 600; color: var(--text); line-height: 1.45; }
    .quiz-q-diff { font-size: .55rem; font-weight: 700; padding: 2px 8px; border-radius: 50px; margin-top: 8px; display: inline-block; }
    .quiz-q-diff.easy { background: rgba(16,185,129,.1); color: var(--green); }
    .quiz-q-diff.medium { background: rgba(245,158,11,.1); color: var(--amber); }
    .quiz-q-diff.hard { background: rgba(229,9,20,.1); color: var(--red); }
    .quiz-opt { width: 100%; padding: 10px 14px; margin-bottom: 6px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: .78rem; text-align: left; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: all .15s; font-family: inherit; }
    .quiz-opt:hover:not(:disabled) { border-color: var(--accent-l); background: rgba(229,9,20,.05); }
    .quiz-opt-letter { width: 24px; height: 24px; border-radius: 6px; background: rgba(229,9,20,.08); color: var(--accent-l); font-weight: 700; font-size: .7rem; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .quiz-opt.correct { border-color: var(--green); background: rgba(16,185,129,.08); }
    .quiz-opt.correct .quiz-opt-letter { background: var(--green); color: #fff; }
    .quiz-opt.wrong { border-color: var(--red); background: rgba(229,9,20,.06); }
    .quiz-opt.wrong .quiz-opt-letter { background: var(--red); color: #fff; }
    .quiz-opt.dimmed { opacity: .4; }
    .quiz-explanation { display: none; background: rgba(229,9,20,.04); border: 1px solid rgba(229,9,20,.08); border-radius: 8px; padding: 10px 14px; margin-top: 8px; }
    .quiz-explanation.show { display: block; }
    .quiz-expl-label { font-size: .6rem; font-weight: 700; color: var(--accent-l); text-transform: uppercase; margin-bottom: 4px; }
    .quiz-next-btn { display: none; width: 100%; padding: 10px; margin-top: 10px; background: linear-gradient(135deg, #E50914, #B81D24); color: #fff; border: none; border-radius: 8px; font-size: .78rem; font-weight: 700; cursor: pointer; font-family: inherit; transition: all .2s; }
    .quiz-next-btn.show { display: block; }
    .quiz-next-btn:hover { transform: translateY(-1px); }
    .quiz-score-ring { position: relative; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; }
    .quiz-score-ring svg { transform: rotate(-90deg); }
    .quiz-score-ring-text { position: absolute; text-align: center; }
    .quiz-score-num { font-size: 1.6rem; font-weight: 800; color: var(--text); display: block; line-height: 1; }
    .quiz-score-denom { font-size: .7rem; color: var(--muted); }
    .quiz-score-msg { text-align: center; font-size: 1rem; font-weight: 700; margin-bottom: 4px; }
    .quiz-score-pct { text-align: center; font-size: .72rem; color: var(--muted); margin-bottom: 16px; }
    .quiz-results { padding: 20px; }
    .quiz-result-btns { display: flex; gap: 8px; justify-content: center; margin-top: 16px; }
    .quiz-result-btns button { padding: 8px 20px; border-radius: 8px; font-size: .78rem; font-weight: 600; cursor: pointer; border: none; font-family: inherit; transition: all .2s; }
    .btn-quiz-retry { background: var(--card); border: 1px solid var(--border) !important; color: var(--text); }
    .btn-quiz-new { background: linear-gradient(135deg, #E50914, #B81D24); color: #fff; }
    .quiz-bd-item { display: flex; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--border); align-items: flex-start; }
    .quiz-bd-icon { font-size: .82rem; font-weight: 700; flex-shrink: 0; width: 20px; }
    .quiz-bd-item.right .quiz-bd-icon { color: var(--green); }
    .quiz-bd-item.wrong .quiz-bd-icon { color: var(--red); }
    .quiz-bd-q { font-size: .75rem; color: var(--text); }
    .quiz-bd-correct { font-size: .68rem; color: var(--green); margin-top: 2px; }
    .quiz-loading { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; gap: 12px; }
    .quiz-spinner { width: 28px; height: 28px; border: 2px solid rgba(229,9,20,.15); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
    .quiz-back-btn { background: none; border: 1px solid var(--border); color: var(--text2); padding: 6px 14px; border-radius: 7px; font-size: .72rem; cursor: pointer; font-family: inherit; margin-bottom: 12px; transition: all .2s; }
    .quiz-back-btn:hover { border-color: var(--accent-l); color: var(--text); }
  </style>
</head>

<body>
  <div class="toast-container" id="toasts"></div>
  <div id="app">
    <div class="loading-state">
      <div class="spinner"></div>
      <div class="loading-text">Loading study room...</div>
    </div>
  </div>

  <script>
    // ============ URL PARAMS ============
    const params = new URLSearchParams(location.search);
    const ROOM_ID = params.get('r');
    const API_URL = params.get('api') ? decodeURIComponent(params.get('api')) : 'http://localhost:3001';

    // ============ SESSION / NAME ============
    function getSession() {
      let s = localStorage.getItem('np_session');
      if (!s) { s = Math.random().toString(36).slice(2, 12); localStorage.setItem('np_session', s); }
      return s;
    }
    function getDisplayName() { return localStorage.getItem('np_viewer_name') || ''; }
    function setDisplayName(n) { localStorage.setItem('np_viewer_name', n); }
    const SESSION_ID = getSession();

    // ============ BACKEND API HELPERS ============
    async function apiGet(path) {
      const res = await fetch(API_URL + path);
      if (!res.ok) throw new Error('API error ' + res.status);
      return res.json();
    }
    async function apiPost(path, data) {
      const res = await fetch(API_URL + path, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      if (!res.ok) {
        let errMsg = 'API error ' + res.status;
        try { const e = await res.json(); if (e.error) errMsg = e.error; } catch(_) {}
        throw new Error(errMsg);
      }
      return res.json();
    }

    // ============ MATH RENDERING ============
    function renderMath(text) {
      if (!text || typeof katex === 'undefined') return escHtml(text || '');
      const parts = []; let last = 0;
      const re = /\$\$([\s\S]*?)\$\$|\$([^\$\n]+?)\$/g; let m;
      while ((m = re.exec(text)) !== null) {
        if (m.index > last) parts.push(escHtml(text.slice(last, m.index)));
        try { const isDisp = m[1] !== undefined; parts.push(katex.renderToString((m[1] || m[2]).trim(), { displayMode: isDisp, throwOnError: false })); }
        catch (_) { parts.push(escHtml(m[0])); }
        last = m.index + m[0].length;
      }
      if (last < text.length) parts.push(escHtml(text.slice(last)));
      return parts.join('');
    }
    function escHtml(s) { return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>'); }
    function fmtTime(secs) { secs = parseInt(secs) || 0; const m = Math.floor(secs / 60), s = secs % 60; return m + ':' + String(s).padStart(2, '0'); }
    function timeAgo(ts) { const d = Date.now() - ts; if (d < 60000) return 'just now'; if (d < 3600000) return Math.floor(d / 60000) + 'm ago'; if (d < 86400000) return Math.floor(d / 3600000) + 'h ago'; return new Date(ts).toLocaleDateString(); }
    function avatarInitials(name) { return (name || '?').split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase(); }
    function stringToColor(str) { const c = ['rgba(229,9,20,.2)', 'rgba(184,29,36,.2)', 'rgba(70,211,105,.2)', 'rgba(245,197,24,.2)', 'rgba(255,77,77,.2)']; let h = 0; for (let i = 0; i < (str || '').length; i++) h = (h * 31 + str.charCodeAt(i)) & 0xFFFFFF; return c[Math.abs(h) % c.length]; }
    function toast(msg, type) { const t = document.createElement('div'); t.className = 'toast toast-' + (type || 'info'); t.textContent = msg; document.getElementById('toasts').appendChild(t); setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'all .2s'; setTimeout(() => t.remove(), 200); }, 2500); }

    function findSegment(videoTime, summary) {
      if (!summary || !summary.length) return null;
      let found = null;
      for (let i = 0; i < summary.length; i++) { if (parseInt(videoTime) >= parseInt(summary[i].start)) found = summary[i]; }
      return found;
    }

    // Store room data globally
    let roomData = null;
    let roomAnnotations = {};

    // ============ RENDER ROOM ============
    function renderRoom(room, annotations) {
      roomData = room;
      roomAnnotations = annotations;
      const meta = room.meta || {};
      const notes = room.notes || [];
      const summary = room.summary || [];
      const anns = annotations || {};

      const timelineHtml = summary.length
        ? '<div class="timeline-strip">' + summary.map(s =>
          '<div class="tl-seg" onclick="window.open(\'https://www.youtube.com/watch?v=' + encodeURIComponent(meta.videoId || room.videoId || '') + '&t=' + parseInt(s.start) + 's\',\'_blank\')"><div class="tl-seg-ts">' + fmtTime(s.start) + '</div><div class="tl-seg-title">' + escHtml(s.title) + '</div></div>'
        ).join('') + '</div>' : '';

      const notesHtml = notes.map((note, idx) => {
        const seg = findSegment(note.videoTime, summary);
        const noteAnns = (anns[String(idx)] || []).sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0));
        const segTag = seg ? '<span class="note-seg-tag">' + escHtml(seg.title) + '</span>' : '';
        const noteText = note.note ? '<div class="note-text">' + escHtml(note.note) + '</div>' : '<div class="note-text empty">(no note)</div>';
        const ocrBlock = note.ocrText ? '<div class="ocr-block"><span class="ocr-label">Extracted Text</span><div class="ocr-text">' + renderMath(note.ocrText) + '</div></div>' : '';
        const explBlock = note.aiExplanation ? '<div class="expl-block"><span class="expl-label">&#10024; AI Explanation</span><div class="ocr-text">' + renderMath(note.aiExplanation) + '</div></div>' : '';
        const annCountLabel = noteAnns.length ? noteAnns.length + ' annotation' + (noteAnns.length !== 1 ? 's' : '') : 'No annotations yet';
        const vid = meta.videoId || room.videoId || '';
        const ytLink = 'https://www.youtube.com/watch?v=' + encodeURIComponent(vid) + '&t=' + (note.videoTime || 0) + 's';
        const annsHtml = noteAnns.map(a =>
          '<div class="ann-item"><div class="ann-avatar" style="background:' + stringToColor(a.name) + '">' + avatarInitials(a.name) + '</div><div class="ann-content"><div class="ann-name">' + escHtml(a.name) + '</div><div class="ann-text">' + escHtml(a.text) + '</div><div class="ann-time">' + timeAgo(a.createdAt || 0) + '</div></div></div>'
        ).join('');
        const snapHtml = note.snapshot ? '<div class="note-img"><img src="' + note.snapshot + '" alt="Frame" loading="lazy"></div>' : '';

        return '<div class="note-card" id="note-' + idx + '"><div class="note-top"><a class="note-ts-pill" href="' + ytLink + '" target="_blank">' + escHtml(note.timestamp) + '</a><span class="note-num">Note #' + (idx + 1) + '</span>' + segTag + '</div>' + snapHtml + '<div class="note-body">' + noteText + ocrBlock + explBlock + '</div><div class="annotations"><div class="ann-heading">' + annCountLabel + '</div>' + annsHtml + '<div class="ann-form"><input class="ann-input" placeholder="Add your annotation..." data-idx="' + idx + '" id="ann-input-' + idx + '" maxlength="500"><button class="ann-submit" data-idx="' + idx + '" id="ann-btn-' + idx + '">Post</button></div></div></div>';
      }).join('');

      const createdDate = meta.createdAt ? new Date(meta.createdAt).toLocaleDateString() : '';
      const statLine = '<span>Shared by ' + escHtml(meta.ownerName || 'Anonymous') + '</span>' +
        (createdDate ? '<span class="meta-dot"></span><span>' + createdDate + '</span>' : '') +
        '<span class="meta-dot"></span><span>' + notes.length + ' capture' + (notes.length !== 1 ? 's' : '') + '</span>';

      document.getElementById('app').innerHTML =
        '<header class="hdr"><div class="hdr-left"><div class="logo"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg></div><span class="brand">NOTEPILOT</span></div><span class="share-pill">Shared room</span></header>' +
        '<div class="meta-bar"><div class="meta-title">' + escHtml(meta.videoTitle || 'Study Notes') + '</div><div class="meta-sub">' + statLine + '</div></div>' +
        timelineHtml +
        '<div class="room-tabs"><button class="room-tab active" data-tab="notes">📝 Notes</button><button class="room-tab" data-tab="quiz">🧠 Quiz</button><button class="room-tab" data-tab="flashcards">🃏 Cards</button></div>' +
        '<div class="room-panel active" id="panel-notes"><div class="notes-section page"><div class="section-heading">Captured Notes</div>' + notesHtml + '</div></div>' +
        '<div class="room-panel" id="panel-quiz"><div class="quiz-section page" id="quiz-area"></div></div>' +
        '<div class="room-panel" id="panel-flashcards"><div class="page" style="padding:16px 20px"><button class="btn-create-quiz" id="generate-room-flashcards" style="margin-bottom:12px">🃏 Generate Flashcards from Notes</button><div id="room-flashcard-list"></div><div id="room-flashcard-active"></div></div></div>';

      // Wire tabs
      document.querySelectorAll('.room-tab').forEach(tab => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.room-tab').forEach(t => t.classList.remove('active'));
          document.querySelectorAll('.room-panel').forEach(p => p.classList.remove('active'));
          tab.classList.add('active');
          document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
          if (tab.dataset.tab === 'quiz') renderQuizList();
          if (tab.dataset.tab === 'flashcards') renderFlashcardList();
        });
      });

      // Wire annotation buttons
      document.querySelectorAll('.ann-submit').forEach(btn => { btn.addEventListener('click', () => handleAnnotation(parseInt(btn.dataset.idx))); });
      document.querySelectorAll('.ann-input').forEach(inp => { inp.addEventListener('keypress', e => { if (e.key === 'Enter') handleAnnotation(parseInt(inp.dataset.idx)); }); });
    }

    // ============ ANNOTATIONS ============
    async function handleAnnotation(noteIdx) {
      const input = document.getElementById('ann-input-' + noteIdx);
      const btn = document.getElementById('ann-btn-' + noteIdx);
      if (!input || !btn) return;
      const text = input.value.trim();
      if (!text) { toast('Type something first', 'error'); return; }
      let name = getDisplayName();
      if (!name) { name = prompt('Your name (shown with annotation):') || 'Anonymous'; setDisplayName(name); }
      btn.disabled = true; btn.textContent = 'Posting...';
      try {
        await apiPost('/api/rooms/' + ROOM_ID + '/annotations', { noteIndex: noteIdx, name, text, sessionId: SESSION_ID });
        input.value = '';
        toast('Annotation posted!', 'success');
        const allAnns = await apiGet('/api/rooms/' + ROOM_ID + '/annotations');
        const noteAnns = allAnns[String(noteIdx)] || [];
        refreshAnnotations(noteIdx, noteAnns);
      } catch (err) {
        toast('Post failed: ' + err.message.slice(0, 60), 'error');
      } finally { btn.disabled = false; btn.textContent = 'Post'; }
    }

    function refreshAnnotations(noteIdx, anns) {
      const card = document.getElementById('note-' + noteIdx);
      if (!card) return;
      const annSection = card.querySelector('.annotations');
      if (!annSection) return;
      anns.sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0));
      const heading = annSection.querySelector('.ann-heading');
      if (heading) heading.textContent = anns.length + ' annotation' + (anns.length !== 1 ? 's' : '');
      annSection.querySelectorAll('.ann-item').forEach(i => i.remove());
      const form = annSection.querySelector('.ann-form');
      anns.forEach(a => {
        const d = document.createElement('div'); d.className = 'ann-item';
        d.innerHTML = '<div class="ann-avatar" style="background:' + stringToColor(a.name) + '">' + avatarInitials(a.name) + '</div><div class="ann-content"><div class="ann-name">' + escHtml(a.name) + '</div><div class="ann-text">' + escHtml(a.text) + '</div><div class="ann-time">' + timeAgo(a.createdAt || 0) + '</div></div>';
        annSection.insertBefore(d, form);
      });
    }

    // ============ POLLING ============
    function startPolling(noteCount) {
      setInterval(async () => {
        try {
          const allAnns = await apiGet('/api/rooms/' + ROOM_ID + '/annotations');
          for (let idx = 0; idx < noteCount; idx++) {
            refreshAnnotations(idx, allAnns[String(idx)] || []);
          }
        } catch (_) { }
      }, 8000);
    }

    // ============ QUIZ IN ROOM ============
    let activeQuiz = null;
    let quizState = { questions: [], current: 0, score: 0, answers: [], active: false };

    async function renderQuizList() {
      const area = document.getElementById('quiz-area');
      if (!area) return;
      area.innerHTML = '<div class="quiz-loading"><div class="quiz-spinner"></div><div class="loading-text">Loading quizzes...</div></div>';
      try {
        const quizzes = await apiGet('/api/rooms/' + ROOM_ID + '/quizzes');
        let html = '<div class="section-heading">Room Quizzes</div>';
        html += '<button class="btn-create-quiz" id="create-quiz-btn">✨ Generate New Quiz from Notes</button>';
        if (!quizzes.length) {
          html += '<div class="quiz-list-empty">No quizzes yet. Create one from the room\'s notes!</div>';
        } else {
          quizzes.forEach(q => {
            html += '<div class="quiz-list-item" data-quiz-id="' + q.quizId + '"><div class="quiz-list-info"><h4>' + escHtml(q.title) + '</h4><span>' + q.questionCount + ' questions · by ' + escHtml(q.createdBy) + ' · ' + timeAgo(q.createdAt) + '</span></div><div class="quiz-list-badge">' + q.questionCount + 'Q</div></div>';
          });
        }
        area.innerHTML = html;
        document.getElementById('create-quiz-btn').addEventListener('click', createRoomQuiz);
        area.querySelectorAll('.quiz-list-item').forEach(item => {
          item.addEventListener('click', () => startRoomQuiz(item.dataset.quizId));
        });
      } catch (err) {
        area.innerHTML = '<div class="quiz-list-empty">Failed to load quizzes: ' + escHtml(err.message) + '</div>';
      }
    }

    async function createRoomQuiz() {
      const area = document.getElementById('quiz-area');
      const btn = document.getElementById('create-quiz-btn');
      if (btn) { btn.disabled = true; btn.textContent = '⏳ Generating...'; }

      // Build context from room notes
      let context = '';
      if (roomData) {
        const meta = roomData.meta || {};
        if (meta.videoTitle) context += 'VIDEO TITLE: "' + meta.videoTitle + '"\n\n';
        const notes = roomData.notes || [];
        if (notes.length) {
          context += 'CAPTURED FRAMES & NOTES:\n';
          notes.forEach(n => {
            let line = '[' + (n.timestamp || '0:00') + ']';
            if (n.note) line += ' Note: ' + n.note + '.';
            if (n.ocrText) line += ' Slide: ' + n.ocrText.slice(0, 300);
            context += line + '\n';
          });
        }
      }
      if (!context.trim()) { toast('No notes to generate quiz from', 'error'); if (btn) { btn.disabled = false; btn.textContent = '✨ Generate New Quiz from Notes'; } return; }

      try {
        const data = await apiPost('/api/ai/quiz', { context });
        if (!data.questions || !data.questions.length) throw new Error('No questions generated');

        let name = getDisplayName();
        if (!name) { name = prompt('Your name:') || 'Anonymous'; setDisplayName(name); }

        await apiPost('/api/rooms/' + ROOM_ID + '/quiz', {
          title: data.quizTitle || 'Quiz',
          questions: data.questions,
          createdBy: name
        });
        toast('Quiz created!', 'success');
        renderQuizList();
      } catch (err) {
        toast('Quiz generation failed: ' + err.message.slice(0, 60), 'error');
        if (btn) { btn.disabled = false; btn.textContent = '✨ Generate New Quiz from Notes'; }
      }
    }

    async function startRoomQuiz(quizId) {
      const area = document.getElementById('quiz-area');
      area.innerHTML = '<div class="quiz-loading"><div class="quiz-spinner"></div><div class="loading-text">Loading quiz...</div></div>';
      try {
        const quiz = await apiGet('/api/rooms/' + ROOM_ID + '/quiz/' + quizId);
        activeQuiz = quiz;
        quizState = { questions: quiz.questions, current: 0, score: 0, answers: [], active: true };
        renderRoomQuizQuestion(0);
      } catch (err) {
        toast('Failed to load quiz', 'error');
        renderQuizList();
      }
    }

    function renderRoomQuizQuestion(idx) {
      const area = document.getElementById('quiz-area');
      const q = quizState.questions[idx];
      const total = quizState.questions.length;
      const pct = Math.round((idx / total) * 100);
      const letters = ['A', 'B', 'C', 'D'];
      const diffClass = { easy: 'easy', medium: 'medium', hard: 'hard' }[q.difficulty] || 'medium';

      area.innerHTML =
        '<div class="quiz-active-wrap">' +
        '<button class="quiz-back-btn" id="quiz-back">← Back to quizzes</button>' +
        '<div class="quiz-progress-wrap"><div class="quiz-progress-top"><span>Question ' + (idx + 1) + ' of ' + total + '</span><span>Score: ' + quizState.score + ' / ' + idx + '</span></div><div class="quiz-progress-bar"><div class="quiz-progress-fill" style="width:' + pct + '%"></div></div></div>' +
        '<div class="quiz-q-card"><div class="quiz-q-topic">' + escHtml(q.topic || 'General') + '</div><div class="quiz-q-text">' + escHtml(q.question) + '</div><span class="quiz-q-diff ' + diffClass + '">' + (q.difficulty || 'medium') + '</span></div>' +
        '<div id="quiz-opts">' + q.options.map((opt, i) => '<button class="quiz-opt" data-idx="' + i + '"><span class="quiz-opt-letter">' + letters[i] + '</span><span>' + escHtml(opt) + '</span></button>').join('') + '</div>' +
        '<div class="quiz-explanation" id="quiz-expl"><div class="quiz-expl-label">Explanation</div><div id="quiz-expl-text"></div></div>' +
        '<button class="quiz-next-btn" id="quiz-next">' + (idx + 1 < total ? 'Next Question →' : 'See Results') + '</button>' +
        '</div>';

      document.getElementById('quiz-back').addEventListener('click', renderQuizList);
      document.querySelectorAll('.quiz-opt').forEach(btn => btn.addEventListener('click', () => handleRoomAnswer(parseInt(btn.dataset.idx))));
      document.getElementById('quiz-next').addEventListener('click', () => {
        const next = quizState.current + 1;
        if (next < quizState.questions.length) { quizState.current = next; renderRoomQuizQuestion(next); }
        else renderRoomQuizResults();
      });
    }

    function handleRoomAnswer(chosenIdx) {
      const q = quizState.questions[quizState.current];
      const correct = chosenIdx === q.correctIndex;
      if (correct) quizState.score++;
      quizState.answers.push({ qIdx: quizState.current, chosen: chosenIdx, correct });
      document.querySelectorAll('.quiz-opt').forEach((btn, i) => {
        btn.disabled = true;
        if (i === q.correctIndex) btn.classList.add('correct');
        else if (i === chosenIdx && !correct) btn.classList.add('wrong');
        else btn.classList.add('dimmed');
      });
      document.getElementById('quiz-expl-text').textContent = q.explanation || '';
      document.getElementById('quiz-expl').classList.add('show');
      document.getElementById('quiz-next').classList.add('show');
    }

    function buildScoreRing(score, total) {
      const pct = score / total;
      const R = 35, C = 2 * Math.PI * R;
      const color = pct >= 0.8 ? '#46d369' : pct >= 0.5 ? '#f5c518' : '#E50914';
      return '<svg width="84" height="84" viewBox="0 0 84 84"><circle cx="42" cy="42" r="' + R + '" fill="none" stroke="rgba(255,255,255,.07)" stroke-width="6.5"/><circle cx="42" cy="42" r="' + R + '" fill="none" stroke="' + color + '" stroke-width="6.5" stroke-dasharray="' + (pct * C).toFixed(1) + ' ' + C.toFixed(1) + '" stroke-linecap="round"/></svg>';
    }

    function renderRoomQuizResults() {
      const area = document.getElementById('quiz-area');
      const total = quizState.questions.length;
      const score = quizState.score;
      const pct = Math.round((score / total) * 100);
      const msg = pct === 100 ? '🏆 Perfect!' : pct >= 80 ? '🎯 Excellent!' : pct >= 60 ? '📚 Good effort!' : pct >= 40 ? '💪 Keep studying!' : '🔁 Needs review';

      const breakdown = quizState.answers.map(a => {
        const q = quizState.questions[a.qIdx];
        return '<div class="quiz-bd-item ' + (a.correct ? 'right' : 'wrong') + '"><span class="quiz-bd-icon">' + (a.correct ? '✓' : '✗') + '</span><div><div class="quiz-bd-q">' + escHtml(q.question) + '</div>' + (!a.correct ? '<div class="quiz-bd-correct">Correct: ' + escHtml(q.options[q.correctIndex]) + '</div>' : '') + '</div></div>';
      }).join('');

      area.innerHTML = '<div class="quiz-results"><div class="quiz-score-ring">' + buildScoreRing(score, total) + '<div class="quiz-score-ring-text"><span class="quiz-score-num">' + score + '</span><span class="quiz-score-denom">/ ' + total + '</span></div></div><div class="quiz-score-msg">' + msg + '</div><div class="quiz-score-pct">' + pct + '% · ' + (total - score) + ' missed</div><div class="quiz-breakdown">' + breakdown + '</div><div class="quiz-result-btns"><button class="btn-quiz-retry" id="qr-retry">↺ Retry</button><button class="btn-quiz-new" id="qr-back">All Quizzes</button></div></div>';

      document.getElementById('qr-retry').addEventListener('click', () => {
        quizState.current = 0; quizState.score = 0; quizState.answers = [];
        renderRoomQuizQuestion(0);
      });
      document.getElementById('qr-back').addEventListener('click', renderQuizList);
    }

    // ============ FLASHCARDS ============
    let roomFlashcardSets = [];

    async function renderFlashcardList() {
      const area = document.getElementById('room-flashcard-list');
      const active = document.getElementById('room-flashcard-active');
      if (!area) return;
      active.innerHTML = '';

      try {
        const sets = await apiGet('/api/rooms/' + ROOM_ID + '/flashcards');
        roomFlashcardSets = sets || [];
      } catch (_) { roomFlashcardSets = []; }

      if (!roomFlashcardSets.length) {
        area.innerHTML = '<div style="text-align:center;color:var(--muted);font-size:.75rem;padding:20px 0">No flashcard sets yet. Generate some!</div>';
      } else {
        area.innerHTML = roomFlashcardSets.map(s =>
          '<div class="quiz-list-item" data-setid="' + s.setId + '"><div class="quiz-list-info"><h4>' + escHtml(s.title) + '</h4><span>' + s.cardCount + ' cards · by ' + escHtml(s.createdBy) + '</span></div><span class="quiz-list-badge">' + s.cardCount + '</span></div>'
        ).join('');
        area.querySelectorAll('.quiz-list-item').forEach(el => {
          el.addEventListener('click', () => openFlashcardSet(el.dataset.setid));
        });
      }

      // Generate button
      const genBtn = document.getElementById('generate-room-flashcards');
      if (genBtn) {
        genBtn.onclick = async () => {
          genBtn.disabled = true;
          genBtn.textContent = '⏳ Generating...';
          try {
            const notes = roomData?.notes || [];
            let ctx = 'VIDEO: ' + (roomData?.meta?.videoTitle || '') + '\n\n';
            notes.forEach(n => {
              ctx += '[' + (n.timestamp || '') + '] ';
              if (n.note) ctx += n.note + '. ';
              if (n.ocrText) ctx += 'Slide: ' + n.ocrText.slice(0, 300) + '. ';
              ctx += '\n';
            });
            const res = await fetch(API_URL + '/api/ai/flashcards', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ context: ctx })
            });
            if (!res.ok) {
              let errMsg = 'Generation failed: ' + res.status;
              try { const e = await res.json(); if (e.error) errMsg = e.error; } catch(_) {}
              throw new Error(errMsg);
            }
            const data = await res.json();
            if (!data?.cards?.length) throw new Error('No cards returned');

            // Prompt for name
            let name = getDisplayName();
            if (!name) { name = prompt('Your name:') || 'Anonymous'; setDisplayName(name); }

            // Save to room
            await apiPost('/api/rooms/' + ROOM_ID + '/flashcards', {
              title: data.title || 'Flashcards',
              cards: data.cards,
              createdBy: name
            });

            toast(data.cards.length + ' flashcards created!', 'success');
            renderFlashcardList();
          } catch (err) {
            toast('Failed: ' + err.message.slice(0, 60), 'error');
          } finally {
            genBtn.disabled = false;
            genBtn.textContent = '🃏 Generate Flashcards from Notes';
          }
        };
      }
    }

    async function openFlashcardSet(setId) {
      const area = document.getElementById('room-flashcard-active');
      if (!area) return;
      area.innerHTML = '<div class="quiz-loading"><div class="quiz-spinner"></div><div style="font-size:.75rem;color:var(--muted)">Loading flashcards...</div></div>';

      try {
        const set = await apiGet('/api/rooms/' + ROOM_ID + '/flashcards/' + setId);
        if (!set || !set.cards || !set.cards.length) throw new Error('Empty set');
        document.getElementById('room-flashcard-list').style.display = 'none';
        document.getElementById('generate-room-flashcards').style.display = 'none';
        renderRoomFlashcards(set.cards, set.title || 'Flashcards');
      } catch (err) {
        area.innerHTML = '<div style="color:var(--red);font-size:.75rem;padding:20px;text-align:center">' + escHtml(err.message) + '</div>';
      }
    }

    function renderRoomFlashcards(cards, title) {
      const area = document.getElementById('room-flashcard-active');
      let idx = 0;
      const total = cards.length;

      function render() {
        const c = cards[idx];
        area.innerHTML =
          '<button class="quiz-back-btn" id="fc-back">← Back to list</button>' +
          '<div style="text-align:center;margin-bottom:10px"><div style="font-size:.82rem;font-weight:700;color:var(--text)">' + escHtml(title) + '</div><div style="font-size:.65rem;color:var(--muted);margin-top:2px">' + (idx + 1) + ' / ' + total + '</div></div>' +
          '<div class="quiz-q-card" id="fc-card" style="cursor:pointer;min-height:120px;position:relative">' +
            '<div class="quiz-q-topic">' + escHtml(c.topic || '') + '</div>' +
            '<div id="fc-front" class="quiz-q-text">' + renderMath(c.front) + '</div>' +
            '<div id="fc-back-text" style="display:none;font-size:.82rem;line-height:1.5;color:var(--green)">' + renderMath(c.back) + '</div>' +
            '<div style="position:absolute;bottom:8px;right:12px;font-size:.6rem;color:var(--muted)" id="fc-hint">Tap to flip</div>' +
          '</div>' +
          '<div style="display:flex;gap:8px;margin-top:8px">' +
            '<button class="btn-quiz-retry" id="fc-prev" style="flex:1" ' + (idx === 0 ? 'disabled' : '') + '>← Prev</button>' +
            '<button class="btn-quiz-new" id="fc-next" style="flex:1">' + (idx === total - 1 ? '↻ Restart' : 'Next →') + '</button>' +
          '</div>';

        let flipped = false;
        document.getElementById('fc-card').addEventListener('click', () => {
          flipped = !flipped;
          document.getElementById('fc-front').style.display = flipped ? 'none' : 'block';
          document.getElementById('fc-back-text').style.display = flipped ? 'block' : 'none';
          document.getElementById('fc-hint').textContent = flipped ? 'Tap to see question' : 'Tap to flip';
        });
        document.getElementById('fc-prev').addEventListener('click', () => { if (idx > 0) { idx--; render(); } });
        document.getElementById('fc-next').addEventListener('click', () => { if (idx < total - 1) { idx++; render(); } else { idx = 0; render(); } });
        document.getElementById('fc-back').addEventListener('click', () => {
          area.innerHTML = '';
          document.getElementById('room-flashcard-list').style.display = '';
          document.getElementById('generate-room-flashcards').style.display = '';
          renderFlashcardList();
        });
      }
      render();
    }

    // ============ MAIN ============
    async function main() {
      if (!ROOM_ID) {
        document.getElementById('app').innerHTML = '<div class="error-state"><p>Invalid room link</p><span>This URL is missing the room ID.</span></div>';
        return;
      }
      try {
        const room = await apiGet('/api/rooms/' + ROOM_ID);
        if (!room || !room.meta) throw new Error('Room not found or has been deleted.');
        const annotations = await apiGet('/api/rooms/' + ROOM_ID + '/annotations');
        renderRoom(room, annotations || {});
        const notes = room.notes || [];
        startPolling(notes.length);
        document.title = 'NotePilot — ' + (room.meta.videoTitle || 'Study Room');
      } catch (err) {
        console.error('Room load error:', err);
        document.getElementById('app').innerHTML = '<div class="error-state"><p>Could not load room</p><span>' + escHtml(err.message) + '</span></div>';
      }
    }

    main();
  </script>
</body>

</html>
